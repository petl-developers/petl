name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch_commit_or_ref:
        description: "Run this workflow in what branch/commit?"
        required: true
        type: string
        default: master

jobs:
  pypi:
    strategy:
      matrix:
        python: ['3.10']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code at ${{ inputs.branch_commit_or_ref || github.ref }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch_commit_or_ref || github.ref }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Build the petl package
        run: |
          python -m build --outdir dist/ .

      - name: Publish the package version ${{ github.event.release.tag_name }} to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          print_hash: true
